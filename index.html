<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS渐变生成器</title>
<style>
/* ============================================================
   白色极简主题 — 纯白底 + 黑字 + 黑边框
   ============================================================ */
:root {
  --bg: #ffffff;
  --panel-bg: #fafafa;
  --text: #111111;
  --text-light: #555555;
  --border: #000000;
  --accent: #000000;
  --accent-hover: #333333;
  --success: #111111;
  --danger: #cc0000;
  --radius: 0px;
  --font-mono: "Cascadia Code","SF Mono","Fira Code","Consolas","Monaco",monospace;
  --font-sans: "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans); background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* 使用说明面板 */
.help-panel {
  border-bottom: 1px solid var(--border); background: #fafafa;
  flex-shrink: 0;
}
.help-toggle {
  padding: 10px 16px; font-size:0.82rem; font-weight:600; cursor:pointer;
  user-select:none; list-style:none; color: var(--text);
  border-bottom: 1px solid var(--border);
}
.help-toggle::-webkit-details-marker { display:none; }
.help-toggle::before { content: '▶ '; font-size:0.7rem; display:inline-block; transition:transform 0.15s; }
details[open] .help-toggle::before { transform: rotate(90deg); }
.help-content {
  padding: 12px 16px; font-size:0.78rem; line-height:1.7; color: var(--text);
  background: #fff; border-bottom: 1px solid var(--border);
}
.help-content h3 { font-size:0.9rem; margin-bottom:6px; font-weight:700; }
.help-content h4 { font-size:0.8rem; margin:8px 0 4px; font-weight:600; }
.help-content ul { padding-left:18px; margin:4px 0; }
.help-content li { margin:2px 0; }
.help-content table { border-collapse:collapse; width:100%; margin:6px 0; font-size:0.75rem; }
.help-content th, .help-content td { border:1px solid var(--border); padding:4px 8px; text-align:left; }
.help-content th { background: #f5f5f5; font-weight:600; }
.help-content code { background:#f0f0f0; padding:1px 4px; font-family:var(--font-mono); font-size:0.72rem; }

/* 标题栏 */
.titlebar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 44px; background: #fafafa;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  user-select: none;
}
.titlebar-title { font-size:0.9rem; font-weight:600; }
.titlebar-actions { display:flex; gap:6px; }

/* 按钮 */
.btn {
  padding: 5px 12px; border: 1px solid var(--border); background: #fff;
  color: var(--text); font-size: 0.82rem; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: all 0.1s;
}
.btn:hover { background: var(--accent); color:#fff; }
.btn.primary { background:var(--accent); color:#fff; }
.btn.primary:hover { background:var(--accent-hover); }

/* 标签页 */
.tab-row {
  display: flex; gap: 0; padding: 8px 16px 0; flex-shrink: 0;
}
.tab-btn {
  padding: 8px 18px; border: 1px solid var(--border); border-bottom: none;
  background: #fafafa; color: var(--text-light);
  font-size: 0.85rem; cursor: pointer; font-family: inherit;
  margin-right: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: #fff; color: var(--text); font-weight:600; border-bottom: 2px solid var(--border); }

.main {
  flex:1; display:flex; overflow:hidden; min-height:0;
}
.tab-content { display:none; flex:1; flex-direction:column; overflow:hidden; gap:14px; }
.tab-content.active { display:flex; }

/* 文本输入框 */
textarea, input[type="text"], input[type="number"], select {
  border: 1px solid var(--border); background: #fff; color: var(--text);
  font-family: inherit; outline: none;
}
textarea:focus, input:focus, select:focus { border-width: 2px; padding: calc(original - 1px); }

/* Toast */
.toast {
  position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
  background:var(--accent); color:#fff; padding:10px 24px;
  font-size:0.85rem; z-index:999;
  opacity:0; transition:opacity 0.2s; pointer-events:none;
  border: 1px solid var(--border);
}
.toast.show { opacity:1; }
.toast.success { background:var(--success); }
.toast.error { background:var(--danger); }

/* CSS 渐变生成器专用样式 */
.toolbar {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: #fafafa; border-bottom: 1px solid var(--border);
  flex-shrink:0; flex-wrap:wrap;
}
.toolbar-hint { font-size:0.72rem; color:var(--text-light); margin-left:auto; }
.main { flex:1; display:grid; grid-template-columns: 320px 1fr; min-height:0; overflow:hidden; }
.sidebar {
  background: #fafafa; border-right: 1px solid var(--border);
  overflow-y: auto; padding: 14px; display:flex; flex-direction:column; gap:14px;
}
.preview-area { display:flex; align-items:center; justify-content:center; background:#fff; min-height:200px; position:relative; overflow:hidden; }
#gradientPreview { width:85%; height:70%; transition: background 0.2s; }
.control-group { display:flex; flex-direction:column; gap:6px; }
.control-label { font-size:0.75rem; color:var(--text-light); text-transform:uppercase; letter-spacing:0.5px; }
.control-row { display:flex; align-items:center; gap:6px; }
.control-row input[type=range] { flex:1; accent-color:var(--accent); }
.control-row input[type=color] { width:32px; height:24px; border:1px solid var(--border); cursor:pointer; padding:0; }
.control-row span { font-size:0.72rem; color:var(--text-light); min-width:32px; text-align:right; font-family:var(--font-mono); }
.gradient-type-row { display:flex; gap:4px; }
.gradient-type-row button { flex:1; }
.stop-item { display:flex; align-items:center; gap:6px; padding:6px 8px; background: #fafafa; border:1px solid var(--border); margin-bottom:4px; }
.stop-item input[type=color] { width:26px; height:22px; border:1px solid var(--border); cursor:pointer; padding:0; }
.stop-item input[type=range] { flex:1; accent-color:var(--accent); }
.stop-item button { background:none; border:none; color:var(--danger); cursor:pointer; font-size:1rem; padding:0 4px; }
.stop-item .stop-pct { font-family:var(--font-mono); font-size:0.7rem; color:var(--text-light); min-width:32px; text-align:right; }
.presets-section { margin-top: 8px; }
.preset-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:6px; margin-top:6px; }
.preset-item { height:40px; border:2px solid transparent; cursor:pointer; transition: all 0.15s; }
.preset-item:hover { border-color:var(--accent); }
.css-output { padding:12px; background:#fafafa; border-top:1px solid var(--border); display:flex; gap:8px; align-items:flex-start; }
.css-output textarea { flex:1; padding:10px 14px; border:1px solid var(--border); font-family:var(--font-mono); font-size:0.8rem; background:#fff; color:var(--text); resize:none; outline:none; height:72px; line-height:1.5; }

/* === Auto-fix: shared utility styles === */
.toolbar {
  display: flex; align-items: center; gap: 6px; padding: 6px 16px;
  flex-shrink: 0; border-bottom: 1px solid var(--border); background: #fafafa;
  flex-wrap: wrap;
}
.toolbar-btn {
  padding: 4px 10px; border: 1px solid var(--border); background: #fff;
  color: var(--text); font-size: 0.78rem; cursor: pointer;
  font-family: inherit; transition: all 0.1s;
}
.toolbar-btn:hover { background: var(--accent); color: #fff; }
.toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
.toolbar-hint { font-size: 0.7rem; color: var(--text-light); margin-left: auto; }
.titlebar-btn {
  padding: 4px 10px; border: 1px solid var(--border); background: #fff;
  color: var(--text); font-size: 0.78rem; cursor: pointer;
  font-family: inherit; transition: all 0.1s;
}
.titlebar-btn:hover { background: var(--accent); color: #fff; }
.accent { background: var(--accent); color: #fff; }
.btn.danger { color: var(--danger); border-color: var(--danger); }
.btn.danger:hover { background: var(--danger); color: #fff; }
.stats {
  display: flex; gap: 16px; padding: 6px 16px; font-size: 0.72rem;
  color: var(--text-light); flex-shrink: 0; border-top: 1px solid var(--border);
  background: #fafafa;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-val { color: var(--text); font-weight: 600; font-family: var(--font-mono); }
.statusbar {
  display: flex; align-items: center; gap: 12px; padding: 6px 16px;
  font-size: 0.72rem; color: var(--text-light);
  border-top: 1px solid var(--border); background: #fafafa; flex-shrink: 0;
}
.status-item { display: flex; align-items: center; gap: 4px; }
.status-count { color: var(--text); font-weight: 600; }
.context-menu {
  position: fixed; background: #fff; border: 1px solid var(--border);
  padding: 6px 0; z-index: 1000; display: none; min-width: 160px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
}
.context-menu.show { display: block; }
.context-item {
  padding: 8px 16px; font-size: 0.82rem; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.1s;
}
.context-item:hover { background: #f0f0f0; }
.context-shortcut { font-size: 0.7rem; color: var(--text-light); }
.editor-area { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
.result-area { display: flex; flex-direction: column; overflow: hidden; }
.panel-body { flex: 1; display: flex; overflow: hidden; }
.divider {
  width: 4px; cursor: col-resize; background: #f0f0f0;
  transition: background 0.15s; flex-shrink: 0;
}
.divider:hover, .divider.active { background: var(--border); }
.drop-highlight { border: 2px dashed var(--accent) !important; background: #fafafa !important; }
.info { padding: 14px; color: var(--text-light); font-size: 0.82rem; }
.indent-select {
  padding: 2px 6px; border: 1px solid var(--border); background: #fff;
  color: var(--text); font-size: 0.75rem; font-family: inherit;
}
.valid { border-color: #000 !important; }
.invalid { border-color: var(--danger) !important; }
.error-msg { color: var(--danger); font-size: var(--font-mono); padding: 4px 0; }
.no-match { color: var(--text-light); font-size: 0.85rem; }
/* regex-tester */
.regex-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  flex-shrink: 0; border-bottom: 1px solid var(--border); background: #fafafa;
}
.regex-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.85rem; }
.flag-options { display: flex; gap: 4px; }
.flag-options .btn { padding: 3px 10px; font-size: 0.75rem; }
.flag-options .btn.active { background: var(--accent); color: #fff; }
.editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-wrap textarea { flex: 1; padding: 12px; border: none; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.85rem; resize: none; outline: none; }
.presets { display: flex; gap: 4px; padding: 6px 16px; flex-shrink: 0; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.preset-btn { padding: 3px 10px; border: 1px solid var(--border); background: #fff; color: var(--text); font-size: 0.72rem; cursor: pointer; font-family: inherit; }
.preset-btn:hover { background: var(--accent); color: #fff; }
.match-text { color: var(--text); font-weight: 600; }
.match-groups { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-light); }
/* screenshot-tool */
.tool-group { display: flex; gap: 2px; }
.tool-label { font-size: 0.7rem; color: var(--text-light); margin-bottom: 2px; }
.stroke-select { padding: 2px 4px; border: 1px solid var(--border); font-size: 0.72rem; }
.selected { background: var(--accent) !important; color: #fff !important; }
.canvas-container {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #f0f0f0; overflow: hidden; position: relative;
}
.canvas-placeholder { color: var(--text-light); font-size: 1.2rem; }
/* color-picker */
.color-preview {
  width: 100%; height: 120px; border: 1px solid var(--border);
  cursor: pointer; transition: background 0.2s;
}
.picker-section { display: flex; flex-direction: column; gap: 10px; }
.mid-section { display: flex; gap: 10px; }
.right-section { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.color-row { display: flex; align-items: center; gap: 8px; }
.color-values { display: flex; flex-direction: column; gap: 4px; }
.section-title { font-size: 0.72rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.info-block { font-size: 0.78rem; line-height: 1.6; color: var(--text); }
.info-block .key { font-weight: 600; }
.favorites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 4px; }
.card { background: #fff; border: 1px solid var(--border); padding: 8px; font-size: 0.75rem; }
.export-preview { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px; background: #fafafa; border: 1px solid var(--border); }
.eyedropper-overlay { position: fixed; inset: 0; z-index: 999; cursor: crosshair; }
.eyedropper-magnifier { width: 30px; height: 30px; border: 2px solid var(--border); border-radius: 50%; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
.eyedropper-label { font-size: 0.75rem; color: var(--text-light); }
/* base64-tool */
.text-panel { display: flex; flex-direction: column; overflow: hidden; }
.text-row { display: flex; gap: 8px; padding: 8px 16px; flex-shrink: 0; }
.text-actions { display: flex; gap: 4px; }
.img-panel { display: flex; flex-direction: column; overflow: hidden; }
.img-actions { display: flex; gap: 4px; padding: 8px 16px; flex-shrink: 0; }
.col-header { font-size: 0.78rem; font-weight: 600; padding: 8px 16px; background: #fafafa; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.col-body { flex: 1; overflow: hidden; display: flex; }
.text-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.img-result { max-width: 100%; max-height: 300px; object-fit: contain; }
.img-dropzone {
  flex: 1; min-height: 160px; border: 2px dashed var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; background: #fafafa; margin: 8px;
}
.img-dropzone:hover { border-color: var(--accent); background: #f5f5f5; }
.placeholder { color: var(--text-light); font-size: 0.85rem; }
/* qrcode-tool */
.input-section { display: flex; gap: 8px; padding: 12px 16px; flex-shrink: 0; }
.input-section textarea { flex: 1; padding: 10px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.85rem; resize: none; min-height: 60px; }
.qr-section {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #fafafa; overflow: hidden;
}
.qr-placeholder { color: var(--text-light); font-size: 1.1rem; }
.size-row { display: flex; align-items: center; gap: 8px; padding: 8px 16px; flex-shrink: 0; }
/* timer */
.mode-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.mode-tab {
  padding: 8px 18px; border: none; border-right: 1px solid var(--border);
  background: #fafafa; color: var(--text-light); font-size: 0.85rem;
  cursor: pointer; font-family: inherit;
}
.mode-tab:hover { color: var(--text); }
.mode-tab.active { background: #fff; color: var(--text); font-weight: 600; }
.controls { display: flex; justify-content: center; gap: 8px; padding: 12px; flex-shrink: 0; }
.control-btn {
  padding: 8px 18px; border: 1px solid var(--border); background: #fff;
  color: var(--text); font-size: 0.85rem; cursor: pointer; font-family: inherit;
}
.control-btn:hover { background: var(--accent); color: #fff; }
.control-btn.start { background: var(--accent); color: #fff; }
.control-btn.pause { background: #f5f5f5; }
.control-btn.reset { color: var(--danger); }
.settings-row { display: flex; align-items: center; gap: 12px; padding: 8px 16px; flex-shrink: 0; }
.time-input-row { display: flex; align-items: center; gap: 8px; }
.time-input-row input { width: 60px; padding: 4px 8px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.85rem; text-align: center; }
.progress-bar { height: 4px; background: #f0f0f0; flex-shrink: 0; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.pomodoro-section { display: flex; flex-direction: column; gap: 8px; padding: 8px 16px; }
.phase-list { display: flex; flex-direction: column; gap: 4px; }
.phase-name { font-size: 0.8rem; color: var(--text); font-weight: 500; }
.phase-time { font-size: 0.72rem; color: var(--text-light); font-family: var(--font-mono); }
.phase-status { font-size: 0.7rem; }
.phase-icon { margin-right: 4px; }
.add-phase-form { display: flex; gap: 6px; align-items: center; padding: 8px 0; }
.add-phase-form input { padding: 4px 8px; border: 1px solid var(--border); font-size: 0.78rem; width: 100px; }
.shortcut-hint { font-size: 0.65rem; color: var(--text-light); text-align: center; padding: 4px; }
/* json formatter result types */
.success { color: var(--text); }
.error { color: var(--danger); }
/* base64 image dropzone text cols */
.img-dropzone .dz-icon { font-size: 2.5rem; }
.img-dropzone .dz-text { color: var(--text-light); font-size: 0.85rem; }
</style>
</head>
<body>

<details class="help-panel" open>
  <summary class="help-toggle">使用说明</summary>
  <div class="help-content">
### CSS 渐变生成器
可视化 CSS 渐变生成器，拖拽色标调整渐变，一键复制 CSS。

**主要功能**
- 线性渐变和径向渐变一键切换
- 线性：角度 0~360° 滑块调节
- 径向：椭圆/圆形 + 9 种起始位置
- 最多 8 个色标节点，滑块调位置、取色器调色
- 12 组精美预设模板（日落/海洋/极光等）
- 一键复制含浏览器前缀的完整 CSS

**注意事项**
- 渐变代码包含 -webkit- 和 -moz- 前缀，兼容主流浏览器
- 点击预设色块可快速套用模板
  </div>
</details>

<div class="titlebar">
  <span class="titlebar-title">🎨 CSS 渐变生成器</span>
  <div class="titlebar-actions">
    <button class="btn primary" onclick="copyCSS()">📋 复制 CSS</button>
  </div>
</div>

<div class="main">
  <!-- 左侧控制面板 -->
  <div class="sidebar">
    <!-- 渐变类型 -->
    <div class="control-group">
      <span class="control-label">渐变类型</span>
      <div class="gradient-type-row">
        <button class="btn primary" data-type="linear" id="btnLinear" onclick="setType('linear')">线性渐变</button>
        <button class="btn" data-type="radial" id="btnRadial" onclick="setType('radial')">径向渐变</button>
      </div>
    </div>

    <!-- 角度控制（线性） -->
    <div class="control-group" id="angleGroup">
      <span class="control-label">渐变角度</span>
      <div class="control-row">
        <input type="range" id="angleSlider" min="0" max="360" value="135" oninput="onParamChange()">
        <span id="angleLabel">135°</span>
      </div>
    </div>

    <!-- 形状控制（径向） -->
    <div class="control-group" id="shapeGroup" style="display:none;">
      <span class="control-label">径向形状</span>
      <div class="control-row">
        <select id="shapeSelect" onchange="onParamChange()">
          <option value="ellipse">椭圆</option>
          <option value="circle">圆形</option>
        </select>
      </div>
    </div>

    <!-- 位置控制（径向） -->
    <div class="control-group" id="positionGroup" style="display:none;">
      <span class="control-label">渐变中心</span>
      <div class="control-row">
        <select id="positionSelect" onchange="onParamChange()">
          <option value="center">中心</option>
          <option value="top left">左上</option>
          <option value="top center">上中</option>
          <option value="top right">右上</option>
          <option value="left">左侧</option>
          <option value="right">右侧</option>
          <option value="bottom left">左下</option>
          <option value="bottom center">下中</option>
          <option value="bottom right">右下</option>
        </select>
      </div>
    </div>

    <!-- 色标列表 -->
    <div class="control-group">
      <div class="control-row" style="justify-content:space-between;">
        <span class="control-label">色标节点</span>
        <button class="btn" onclick="addStop()" style="font-size:0.7rem;padding:2px 8px;">+ 添加</button>
      </div>
      <div id="stopList"></div>
    </div>

    <!-- 预设 -->
    <div class="presets-section">
      <span class="control-label">预设模板</span>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
  </div>

  <!-- 右侧预览区 -->
  <div class="preview-area" id="previewArea">
    <div id="gradientPreview"></div>
  </div>
</div>

<!-- CSS 输出 -->
<div class="css-output">
  <textarea id="cssOutput" readonly spellcheck="false"></textarea>
  <button class="btn primary" onclick="copyCSS()">复制</button>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  /* ---- 状态管理 ---- */
  var state = {
    type: 'linear',        // 'linear' | 'radial'
    angle: 135,
    shape: 'ellipse',      // radial
    position: 'center',    // radial
    stops: [
      { color: '#7c6ff7', pos: 0 },
      { color: '#e0556a', pos: 100 }
    ]
  };

  /* ---- 预设模板 ---- */
  var presets = [
    { name: '日落', type:'linear', angle:180, stops:[{c:'#ff6b6b',p:0},{c:'#feca57',p:100}] },
    { name: '海洋', type:'linear', angle:135, stops:[{c:'#667eea',p:0},{c:'#764ba2',p:100}] },
    { name: '极光', type:'linear', angle:135, stops:[{c:'#a18cd1',p:0},{c:'#fbc2eb',p:100}] },
    { name: '薄荷', type:'linear', angle:135, stops:[{c:'#00d2ff',p:0},{c:'#3a7bd5',p:100}] },
    { name: '火焰', type:'linear', angle:0, stops:[{c:'#f12711',p:0},{c:'#f5af19',p:100}] },
    { name: '森林', type:'linear', angle:135, stops:[{c:'#11998e',p:0},{c:'#38ef7d',p:100}] },
    { name: '夜空', type:'linear', angle:180, stops:[{c:'#2c3e50',p:0},{c:'#3498db',p:100}] },
    { name: '樱花', type:'linear', angle:135, stops:[{c:'#ffecd2',p:0},{c:'#fcb69f',p:100}] },
    { name: '径向圆', type:'radial', shape:'circle', stops:[{c:'#7c6ff7',p:0},{c:'#2d1b69',p:100}] },
    { name: '径向光', type:'radial', shape:'ellipse', stops:[{c:'#fff',p:0},{c:'#667eea',p:100}] },
    { name: '霓虹', type:'linear', angle:90, stops:[{c:'#f093fb',p:0},{c:'#f5576c',p:100}] },
    { name: '霜蓝', type:'linear', angle:135, stops:[{c:'#e0eaf5',p:0},{c:'#cfdef3',p:100}] }
  ];

  /* ---- DOM 引用 ---- */
  var angleSlider   = document.getElementById('angleSlider');
  var angleLabel    = document.getElementById('angleLabel');
  var angleGroup    = document.getElementById('angleGroup');
  var shapeGroup    = document.getElementById('shapeGroup');
  var positionGroup = document.getElementById('positionGroup');
  var shapeSelect   = document.getElementById('shapeSelect');
  var positionSelect = document.getElementById('positionSelect');
  var stopList      = document.getElementById('stopList');
  var cssOutput     = document.getElementById('cssOutput');
  var gradientPreview = document.getElementById('gradientPreview');
  var toastEl       = document.getElementById('toast');

  var toastTimer = null;
  function showToast(msg, type) {
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = msg; toastEl.className = 'toast ' + (type||'') + ' show';
    toastTimer = setTimeout(function(){toastEl.classList.remove('show');}, 2000);
  }

  /* ---- 构建 CSS 字符串 ---- */
  function buildCSS() {
    var stopsCSS = state.stops.map(function(s) {
      return s.color + ' ' + s.pos + '%';
    }).join(', ');

    if (state.type === 'linear') {
      return 'linear-gradient(' + state.angle + 'deg, ' + stopsCSS + ')';
    } else {
      var shape = state.shape === 'circle' ? 'circle' : '';
      var pos = 'at ' + state.position;
      return 'radial-gradient(' + shape + ' ' + pos + ', ' + stopsCSS + ')';
    }
  }

  /* ---- 应用渐变 ---- */
  function applyGradient() {
    var css = buildCSS();
    var compat = [
      'background: ' + css + ';',
      'background: -webkit-' + css + ';',
      'background: -moz-' + css + ';'
    ].join('\n');
    cssOutput.value = compat;
    gradientPreview.style.background = css;
  }

  /* ---- 渲染色标列表 ---- */
  function renderStops() {
    var html = '';
    for (var i = 0; i < state.stops.length; i++) {
      var s = state.stops[i];
      html += '<div class="stop-item">' +
        '<input type="color" value="' + s.color + '" onchange="updateStopColor(' + i + ', this.value)" title="色标颜色">' +
        '<input type="range" min="0" max="100" value="' + s.pos + '" oninput="updateStopPos(' + i + ', this.value)" title="色标位置">' +
        '<span class="stop-pct">' + s.pos + '%</span>' +
        (state.stops.length > 2 ? '<button onclick="removeStop(' + i + ')" title="删除">&times;</button>' : '') +
        '</div>';
    }
    stopList.innerHTML = html;
  }

  /* ---- 色标操作 ---- */
  window.updateStopColor = function(idx, color) {
    state.stops[idx].color = color;
    applyGradient();
  };
  window.updateStopPos = function(idx, pos) {
    state.stops[idx].pos = parseInt(pos);
    renderStops();
    applyGradient();
  };
  window.addStop = function() {
    if (state.stops.length >= 8) { showToast('最多添加8个色标'); return; }
    // 在最后一个色标前插入
    var last = state.stops[state.stops.length - 1];
    var prev = state.stops[state.stops.length - 2];
    var midPos = Math.round((prev ? prev.pos : 0) + (last.pos - (prev ? prev.pos : 0)) / 2);
    var midColor = '#aaaaaa';
    state.stops.splice(state.stops.length - 1, 0, { color: midColor, pos: midPos });
    renderStops();
    applyGradient();
    showToast('已添加色标');
  };
  window.removeStop = function(idx) {
    if (state.stops.length <= 2) { showToast('至少保留2个色标'); return; }
    state.stops.splice(idx, 1);
    renderStops();
    applyGradient();
  };

  /* ---- 类型切换 ---- */
  window.setType = function(type) {
    state.type = type;
    document.getElementById('btnLinear').classList.toggle('primary', type === 'linear');
    document.getElementById('btnRadial').classList.toggle('primary', type === 'radial');
    angleGroup.style.display = type === 'linear' ? '' : 'none';
    shapeGroup.style.display = type === 'radial' ? '' : 'none';
    positionGroup.style.display = type === 'radial' ? '' : 'none';
    applyGradient();
  };

  /* ---- 参数变更 ---- */
  window.onParamChange = function() {
    state.angle = parseInt(angleSlider.value);
    angleLabel.textContent = state.angle + '°';
    state.shape = shapeSelect.value;
    state.position = positionSelect.value;
    applyGradient();
  };

  /* ---- 应用预设 ---- */
  function applyPreset(p) {
    state.type = p.type;
    state.angle = p.angle || 135;
    state.shape = p.shape || 'ellipse';
    state.position = p.position || 'center';
    state.stops = p.stops.map(function(s) { return { color: s.c, pos: s.p }; });

    angleSlider.value = state.angle;
    angleLabel.textContent = state.angle + '°';
    shapeSelect.value = state.shape;
    positionSelect.value = state.position;

    document.getElementById('btnLinear').classList.toggle('primary', state.type === 'linear');
    document.getElementById('btnRadial').classList.toggle('primary', state.type === 'radial');
    angleGroup.style.display = state.type === 'linear' ? '' : 'none';
    shapeGroup.style.display = state.type === 'radial' ? '' : 'none';
    positionGroup.style.display = state.type === 'radial' ? '' : 'none';

    renderStops();
    applyGradient();
  }

  /* ---- 渲染预设网格 ---- */
  function renderPresets() {
    var grid = document.getElementById('presetGrid');
    var html = '';
    for (var i = 0; i < presets.length; i++) {
      var p = presets[i];
      var css = '';
      var stopsCSS = p.stops.map(function(s) { return s.c + ' ' + s.p + '%'; }).join(', ');
      if (p.type === 'linear') {
        css = 'linear-gradient(' + (p.angle||135) + 'deg, ' + stopsCSS + ')';
      } else {
        css = 'radial-gradient(' + (p.shape||'ellipse') + ' at center, ' + stopsCSS + ')';
      }
      html += '<div class="preset-item" style="background:' + css + '" title="' + p.name +
        '" onclick="applyPreset(presets[' + i + '])"></div>';
    }
    grid.innerHTML = html;
  }

  /* ---- 复制 CSS ---- */
  window.copyCSS = function() {
    var css = cssOutput.value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(css).then(function() { showToast('CSS 已复制', 'success'); });
    } else {
      cssOutput.select();
      try { document.execCommand('copy'); showToast('CSS 已复制', 'success'); }
      catch(e) { showToast('复制失败，请手动选择', 'error'); }
    }
  };

  /* ---- 初始化 ---- */
  renderStops();
  renderPresets();
  applyGradient();
})();
</script>
</body>
</html>
